spring:
  application:
    name: manotaranga-backend

  # Database - Neon PostgreSQL
  datasource:
    url: jdbc:${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  h2:
    console:
      enabled: false

server:
  port: ${SERVER_PORT:8089}

# Counseling booking: slot rules for GET /api/bookings/available-slots
booking:
  availability:
    timezone: ${BOOKING_TIMEZONE:Asia/Kolkata}
    first-slot-hour: 9
    last-slot-end-hour: 20
    excluded-slot-start-hours:
      - 14
      - 15
    # ISO yyyy-MM-dd — list closed days (public holidays / festivals)
    festival-dates: []

# Brevo (Sendinblue) Email configuration
brevo:
  api-key: ${BREVO_API_KEY}
  from-email: ${BREVO_FROM_EMAIL}
  from-name: ${BREVO_FROM_NAME}
  admin-email: ${BREVO_ADMIN_EMAIL}
# CORS - allow frontend
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Razorpay Payment Gateway
razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

# Groq AI - Psychology chatbot
groq:
  api-key: ${GROQ_API_KEY}
  model: ${GROQ_MODEL}
